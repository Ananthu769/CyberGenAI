<div class="card upload-card mt-5">

    <h3>Upload Security Log</h3>

    <form action="/upload"
          method="POST"
          enctype="multipart/form-data">

        <input
            type="file"
            name="logfile"
            class="form-control"
            required>

        <button
            type="submit"
            class="btn btn-success mt-3 w-100">

            Analyze with AI

        </button>

    </form>

</div>
